# tmux.conf — Aree fleet shared config
# Source from ~/.tmux.conf via:
#   source-file -q ~/projects/aree/ψ/dotfiles/tmux.conf
# The -q flag silently skips this line if the repo path isn't checked out yet.

# Mouse + scrollback
set -g mouse on
set -g history-limit 50000

# CMD-like clipboard behavior over SSH + Windows Terminal:
# - Drag selection auto-copies to Windows clipboard via OSC 52 escape sequences
#   (and into tmux's own paste buffer at the same time).
# - Plain right-click pastes from tmux's paste buffer (effectively the same as
#   the Windows clipboard whenever the last copy happened inside this tmux).
# - Shift+right-click is NOT captured by tmux, so it falls through to Windows
#   Terminal which pastes from the true Windows clipboard (use this when the
#   text was copied from another app like a browser or Notepad).
# - Mouse wheel still scrolls within tmux (mouse on stays).
set -g set-clipboard on

# Plain right-click → paste from tmux buffer (no copy-mode entered).
bind-key -T root MouseDown3Pane paste-buffer

# Drop the right-click status-bar menus (rarely useful, get in the way).
unbind-key -T root MouseDown3Status
unbind-key -T root MouseDown3StatusLeft
unbind-key -T copy-mode MouseDown3Pane
unbind-key -T copy-mode-vi MouseDown3Pane

# When a drag selection ends, copy to clipboard and exit copy-mode in one motion.
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
